# Multi-platform Tauri 2 installer builds for InstaSplatter v0.10+.
#
# Triggers:
#   - workflow_dispatch — build + upload CI artifacts (no GitHub Release)
#   - push tags v*     — build + upload artifacts; then attach to the GitHub Release for that tag
#
# Caveats:
#   - Linux needs WebKitGTK 4.1 (+ related GTK/rsvg/patchelf packages).
#   - AppImage on modern glibc: NO_STRIP=true avoids linuxdeploy strip failures.
#   - macOS: unsigned / ad-hoc dmg is intentional for v0.10 (no notarization secrets).
#   - Linux/macOS are best-effort; Windows NSIS remains the primary supported installer.
#   - ANUGA/SWMM scientific sidecars are not bundled in these installers.

name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundle: nsis
          - platform: ubuntu-latest
            bundle: linux
          - platform: macos-latest
            bundle: dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Frontend build
        run: npm run build

      - name: Tauri build
        env:
          # Avoid AppImage linuxdeploy strip failures on newer glibc (.relr.dyn).
          NO_STRIP: ${{ matrix.platform == 'ubuntu-latest' && 'true' || '' }}
        run: npm run tauri build

      - name: Upload Windows NSIS artifact
        if: matrix.bundle == 'nsis'
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.bundle == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-deb
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload macOS dmg artifact
        if: matrix.bundle == 'dmg'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  draft-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Attach installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          body: |
            See [RELEASE.md](./RELEASE.md) and
            [docs/assets/verify/v0.10/VERIFY-SUMMARY.md](./docs/assets/verify/v0.10/VERIFY-SUMMARY.md).

            **Platforms:** Windows NSIS (primary); Linux AppImage/deb and macOS dmg are best-effort.
            **Signing:** macOS builds are unsigned / ad-hoc for v0.10 (no notarization secrets).
          files: installers/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
