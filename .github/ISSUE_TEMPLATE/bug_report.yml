name: Bug report
description: Something is broken or behaves unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Include enough detail for someone else to reproduce it on Windows.
        Note which **suite** you were in (Reconstruction vs Geospatial) and whether Standard or Experimental Mode was on.
  - type: dropdown
    id: suite
    attributes:
      label: Suite
      options:
        - Reconstruction
        - Geospatial
        - Both / shell-wide
        - Unsure / not applicable
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Standard (default)
        - Experimental (NC ack)
        - Unsure / not applicable
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps (e.g. video/image folder for Reconstruction, geo project / flood run for Geospatial).
      placeholder: |
        1. Launch InstaSplatter
        2. Switch to …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error text, log snippets, or screenshots if useful. For flood, note whether the run was labelled scientific, preview, or demo/scaffold.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: InstaSplatter version
      description: e.g. installer version from Releases, or `package.json` / git commit if building from source
      placeholder: "0.8.1"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 24H2"
    validations:
      required: true
  - type: input
    id: gpu
    attributes:
      label: GPU
      description: Vendor and model help a lot for wgpu / CUDA / engine selection issues.
      placeholder: "NVIDIA RTX 4060 / AMD … / Intel …"
    validations:
      required: false
  - type: dropdown
    id: input_type
    attributes:
      label: Input / workflow
      options:
        - Video file
        - Image folder
        - Batch queue
        - Geospatial project / telemetry / GCP
        - Flood scientific (ANUGA/SWMM)
        - Flood preview / demo
        - Other / not applicable
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: FFmpeg is on PATH (if this involves video input)
          required: false
        - label: Optional sidecars/weights are installed if this involves densify or scientific flood (or I expected a clear failure without them)
          required: false
